; Haraka SMTP Configuration
; Main configuration file for the SMTP server

; Host to bind to (0.0.0.0 for all interfaces)
host=0.0.0.0

; Port to listen on (587 for submission with STARTTLS)
port=587

; Maximum concurrent connections
max_connections=100

; Maximum message size (25MB)
max_size=26214400

; Enable nodes (clustering)
nodes=2

; User to run as (root for binding to port 587)
user=root

; Group to run as
group=root

; Timeout in seconds
timeout=300

; Banner to display on connection
banner=Haraka SMTP Relay Ready

; Log level (LOGDEBUG, LOGINFO, LOGNOTICE, LOGWARN, LOGERROR, LOGCRIT, LOGALERT, LOGEMERG)
; loglevel=LOGINFO
