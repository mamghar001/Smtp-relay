# Authentication configuration for Haraka SMTP Relay
# This defines the credentials for connecting to the relay

[core]
# Authentication methods supported
methods = PLAIN,CRAM-MD5

# IMPORTANT: Disable sender constraint to allow FROM address rotation
# When true, forces envelope sender to match auth user
# When false, allows rotate_senders plugin to modify the FROM address
constrain_sender = false

[users]
# ============================================
# ADD YOUR RELAY AUTHENTICATION CREDENTIALS HERE
# ============================================
# These credentials are used to authenticate clients connecting to the relay
# Format: username@domain.com = password
#
# IMPORTANT: These are NOT the rotating mailboxes - those are configured
# in rotate_senders.js
#
# Example:
# relay@yourdomain.com = YourStrongPassword123!
# mia.hall@moescalesystem.shop = MoeScale123!

relay@yourdomain.com = ChangeThisPassword123!
